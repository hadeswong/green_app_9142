<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手機版圖片網頁互動</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .phone-viewport {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        /* 圖片基礎設定 */
        .full-page-img {
            width: 100%;
            display: block;
        }

        /* 圖一：首頁背景（維持滿版） */
        .page-home {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .page-home .full-page-img {
            height: 100%;
            object-fit: cover; 
        }

        /* 圖一中央的 G$ 隱藏按鈕 */
        .btn-hidden-gs {
            position: absolute;
            bottom: 5%;       
            left: 50%;        
            transform: translateX(-50%);
            width: 205px;      
            height: 185px;     
            background-color: rgba(255, 0, 0, 0); /* 測試可改為 0.5 變半透明紅 */
            border-radius: 50%; 
            cursor: pointer;
            z-index: 10;
        }

        /* ==================== 彈出層通用設定 (從最底部滑出) ==================== */
        .popup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); 
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 💡 關鍵：強制所有內容從最底端對齊 */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        /* 確保圖三疊在圖二上方 */
        #popup-menu { z-index: 20; }
        #popup-qr { z-index: 30; } 

        .popup-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 彈出內容：高度隨圖片自動撐開，並靠底 */
        .popup-content {
            width: 100%;
            height: auto; /* 💡 改為 auto，圖片有多高，選單就升起多高，不會懸空置中 */
            position: relative;
            background: transparent; 
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }
        .popup-overlay.active .popup-content {
            transform: translateY(0);
        }

        /* 確保彈出層內的圖片寬度 100% 自適應，高度隨比例，不強制拉伸 */
        .popup-content .full-page-img {
            width: 100%;
            height: auto;
            object-fit: normal;
        }

        /* ==================== 圖二：功能選單按鈕微調 ==================== */
        /* 圖二的「換禮品」隱藏按鈕 (百分比定位會根據圖二自身高度計算) */
        .btn-hidden-reward {
            position: absolute;
            top: 18%;         
            left: 50%;        
            transform: translateX(-50%);
            width: 110px;      
            height: 110px;     
            background-color: rgba(159, 159, 202, 0.5); /* 測試可改為 0.5 變半透明藍 */
            border-radius: 50%;
            cursor: pointer;
            z-index: 25;
        }

        /* 🆕 圖二專屬隱藏關閉按鈕 */
        .btn-hidden-close-menu {
            position: absolute;
            top: 4%;          /* 💡 依據圖二圖片中的 X 位置自行調整上下 */
            right: 6%;        /* 💡 依據圖二圖片中的 X 位置自行調整左右 */
            width: 50px;      
            height: 50px;     
            background-color: rgba(255, 0, 0, 0.5); /* 🔴 預設半透明紅，對準後請改為最後的 0.5 改為 0 */
            border-radius: 50%; 
            cursor: pointer;
            z-index: 26;      
        }


        /* ==================== 圖三：換禮品二維碼關閉按鈕 ==================== */
        /* 圖三專屬隱藏關閉按鈕 */
        .btn-hidden-close-qr {
            position: absolute;
            top: 4%;          /* 💡 依據圖三圖片中的 X 位置自行調整 */
            right: 6%;        /* 💡 依據圖三圖片中的 X 位置自行調整 */
            width: 50px;      
            height: 50px;     
            background-color: rgba(255, 0, 0, 0.5); /* 測試可改為 0.5 變半透明紅 */
            border-radius: 50%; 
            cursor: pointer;
            z-index: 40;      
        }
    </style>
</head>
<body>

<div class="phone-viewport">

    <div class="page-home">
        <img class="full-page-img" src="IMG_8772.jpg" alt="圖一首頁">
        <div class="btn-hidden-gs" id="action-gs"></div>
    </div>

    <div class="popup-overlay" id="popup-menu">
        <div class="popup-content">
            <div class="btn-hidden-close-menu" id="action-close-menu"></div>

            <img class="full-page-img" src="IMG_8773.jpg" alt="圖二選單">
            <div class="btn-hidden-reward" id="action-reward"></div>
        </div>
    </div>

    <div class="popup-overlay" id="popup-qr">
        <div class="popup-content">
            <div class="btn-hidden-close-qr" id="action-close-qr"></div>
            <img class="full-page-img" src="IMG_8774.jpg" alt="圖三二維碼">
        </div>
    </div>

</div>

<script>
    const actionGs = document.getElementById('action-gs');
    const actionReward = document.getElementById('action-reward');
    const actionCloseMenu = document.getElementById('action-close-menu');
    const actionCloseQr = document.getElementById('action-close-qr');
    
    const popupMenu = document.getElementById('popup-menu');
    const popupQr = document.getElementById('popup-qr');

    // 1. 點擊圖一 G$ -> 從最底部升起圖二
    actionGs.addEventListener('click', () => {
        popupQr.classList.remove('active'); 
        popupMenu.classList.add('active'); 
    });

    // 2. 點擊圖二換禮品 -> 從最底部升起圖三 (蓋在圖二上方)
    actionReward.addEventListener('click', () => {
        popupQr.classList.add('active'); 
    });

    // 3. 點擊圖二專屬關閉按鈕 -> 圖二向下滑動關閉 (退回圖一)
    actionCloseMenu.addEventListener('click', () => {
        popupMenu.classList.remove('active');
    });

    // 4. 點擊圖三專屬關閉按鈕 -> 圖三向下滑動關閉 (退回圖二)
    actionCloseQr.addEventListener('click', () => {
        popupQr.classList.remove('active');
    });
</script>

</body>
</html>
